version: v2

inputs:
  - module: buf.build/ory/keto

plugins:
  - local: ["go", "tool", "protoc-gen-go"]
    out: gen/go
    opt: paths=source_relative

  - local: ["go", "tool", "protoc-gen-go-grpc"]
    out: gen/go
    opt: paths=source_relative

  - local: ["go", "tool", "protoc-gen-connect-go"]
    out: gen/go
    opt: paths=source_relative

    # remove once generated code is removed from the proto directory
  - local: ["go", "tool", "protoc-gen-go"]
    out: proto
    opt: paths=source_relative

    # remove once generated code is removed from the proto directory
  - local: ["go", "tool", "protoc-gen-go-grpc"]
    out: proto
    opt: paths=source_relative

  - local: ["npx", "@bufbuild/protoc-gen-es"]
    out: gen/es

  - local: ["npx", "@connectrpc/protoc-gen-connect-es"]
    out: gen/es

  - local: ["go", "tool", "protoc-gen-doc"]
    out: gen/doc
    opt: proto/markdown.tmpl,gen/doc/buf.md
    strategy: all

managed:
  enabled: true
  # currently not used but keep it for future reference, as it took me quite some time to figure out
  # disable:
  #   - file_option: go_package
  #     module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/ory/keto/gen/go
    - file_option: go_package
      value: github.com/ory/keto/gen/go/ory/keto/relation_tuples/v1alpha2;relationtuples
      path: ory/keto/relation_tuples/v1alpha2
    - file_option: go_package
      value: github.com/ory/keto/gen/go/ory/keto/opl/v1alpha1;opl
      path: ory/keto/opl/v1alpha1
    # currently not used but keep it for future reference, as it took me quite some time to figure out
    # - file_option: go_package_prefix
    #   module: buf.build/grpc-ecosystem/grpc-gateway
    #   value: github.com/grpc-ecosystem/grpc-gateway/v2
